<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Social Hub · Smart Iframe Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0b0e14;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .dashboard {
            max-width: 1100px;
            width: 100%;
            background: #161b22;
            border-radius: 2.5rem;
            padding: 2rem 1.5rem 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            border: 1px solid #2a3340;
        }

        h1 {
            font-weight: 500;
            font-size: 1.8rem;
            color: #f0f3f8;
            text-align: center;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .subtitle {
            text-align: center;
            color: #6a7fa0;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid #242d3b;
            padding-bottom: 1rem;
        }

        .subtitle .badge-embed {
            background: #1d8a4f;
            color: #fff;
            padding: 0.1rem 0.7rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .subtitle .badge-link {
            background: #8a6e1d;
            color: #fff;
            padding: 0.1rem 0.7rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .social-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 1.2rem;
            justify-items: center;
            margin: 1.5rem 0;
        }

        .social-card {
            background: #1e2630;
            width: 100%;
            max-width: 150px;
            aspect-ratio: 1 / 1;
            border-radius: 1.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            cursor: pointer;
            transition: all 0.15s ease;
            border: 1px solid #2f3947;
            padding: 0.5rem;
            position: relative;
            text-decoration: none;
            color: inherit;
        }

        .social-card:hover {
            transform: scale(1.04);
            background: #29323f;
            border-color: #5a6f8c;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        .social-card:active {
            transform: scale(0.95);
        }

        .social-card .logo-svg {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .social-card .platform-name {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #b4c8e8;
            background: #0f141c;
            padding: 0.15rem 0.8rem;
            border-radius: 20px;
            border: 1px solid #314159;
            letter-spacing: 0.3px;
        }

        .social-card .embed-badge {
            position: absolute;
            top: 6px;
            right: 6px;
            font-size: 0.55rem;
            font-weight: 700;
            padding: 0.1rem 0.5rem;
            border-radius: 12px;
            background: #1d8a4f;
            color: #fff;
            letter-spacing: 0.3px;
        }

        .social-card .link-badge {
            position: absolute;
            top: 6px;
            right: 6px;
            font-size: 0.55rem;
            font-weight: 700;
            padding: 0.1rem 0.5rem;
            border-radius: 12px;
            background: #8a6e1d;
            color: #fff;
            letter-spacing: 0.3px;
        }

        /* Full‑screen overlay */
        .iframe-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0b0e14;
            z-index: 9999;
            display: none;
            flex-direction: column;
            animation: fadeIn 0.2s ease;
        }

        .iframe-overlay.active {
            display: flex;
        }

        .iframe-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.7rem 1.2rem;
            background: #131a22;
            border-bottom: 1px solid #2c3848;
            flex-shrink: 0;
        }

        .iframe-header .platform-title {
            color: #e8edf5;
            font-weight: 500;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .iframe-header .platform-title .mode-tag {
            background: #2a3649;
            padding: 0.1rem 0.8rem;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 400;
            color: #a3b9dd;
        }

        .close-btn {
            background: #2c3a4e;
            border: none;
            color: #f0f4fe;
            font-size: 1.6rem;
            line-height: 1;
            padding: 0 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 300;
            transition: 0.15s;
            border: 1px solid #44556b;
        }

        .close-btn:hover {
            background: #3f506a;
            transform: scale(1.02);
        }

        .iframe-wrapper {
            flex: 1;
            width: 100%;
            background: #000;
            position: relative;
            overflow: hidden;
        }

        .iframe-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: #fff;
        }

        .fallback-message {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            width: 100%;
            height: 100%;
            background: #0f141c;
            color: #b4c8e8;
            padding: 2rem;
            text-align: center;
        }

        .fallback-message h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #e8edf5;
        }

        .fallback-message p {
            max-width: 400px;
            margin-bottom: 1.5rem;
            color: #8899bb;
        }

        .fallback-message .btn-open {
            background: #2a6bf0;
            color: #fff;
            border: none;
            padding: 0.7rem 2rem;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            text-decoration: none;
            display: inline-block;
        }

        .fallback-message .btn-open:hover {
            background: #3b7bfa;
            transform: scale(1.03);
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }

        @media (max-width: 550px) {
            .dashboard {
                padding: 1.2rem 0.8rem;
            }
            .social-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 0.8rem;
            }
            .social-card {
                max-width: 100%;
                border-radius: 1.2rem;
            }
            .social-card .logo-svg {
                width: 38px;
                height: 38px;
            }
            h1 {
                font-size: 1.4rem;
            }
        }

        @media (max-width: 400px) {
            .social-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <h1>🌐 Social Hub</h1>
        <div class="subtitle">
            <span class="badge-embed">🟢 embed</span> = works in iframe &nbsp;·&nbsp;
            <span class="badge-link">🟡 link</span> = opens in new tab (blocked by platform)
        </div>

        <div class="social-grid" id="socialGrid">
            <!-- Each card: data-embed="true" means it CAN be iframed -->
            <!-- YouTube: embed allowed via youtube.com/embed/ -->
            <div class="social-card" data-platform="YouTube" data-url="https://www.youtube.com/embed/" data-embed="true" data-embed-url="https://www.youtube.com/embed/">
                <div class="logo-svg">
                    <svg viewBox="0 0 24 24" width="48" height="48" fill="#FF0000">
                        <path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                    </svg>
                </div>
                <span class="platform-name">YouTube</span>
                <span class="embed-badge">embed</span>
            </div>

            <!-- X (Twitter) embed: use platform.twitter.com/widgets/tweet? -->
            <div class="social-card" data-platform="X (Twitter)" data-url="https://x.com/" data-embed="true" data-embed-url="https://platform.twitter.com/widgets/tweet?">
                <div class="logo-svg">
                    <svg viewBox="0 0 24 24" width="48" height="48" fill="#FFFFFF">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                    </svg>
                </div>
                <span class="platform-name">X</span>
                <span class="embed-badge">embed</span>
            </div>

            <!-- TikTok embed: use www.tiktok.com/embed/ -->
            <div class="social-card" data-platform="TikTok" data-url="https://www.tiktok.com/" data-embed="true" data-embed-url="https://www.tiktok.com/embed/">
                <div class="logo-svg">
                    <svg viewBox="0 0 24 24" width="48" height="48" fill="#FFFFFF">
                        <path d="M22.49 8.207v5.23a8.41 8.41 0 01-4.8-1.555v6.965a7.936 7.936 0 01-7.928 7.927A7.936 7.936 0 011.833 19.93a7.934 7.934 0 017.93-7.93h.667v4.858a2.836 2.836 0 00-1.413-1.463 2.84 2.84 0 00-3.848 1.478 2.844 2.844 0 001.478 3.848 2.845 2.845 0 003.848-1.478 2.84 2.84 0 00.158-1.386V1.995h4.804a5.444 5.444 0 001.48 3.637 5.46 5.46 0 003.587 1.705l.005.87z"/>
                    </svg>
                </div>
                <span class="platform-name">TikTok</span>
                <span class="embed-badge">embed</span>
            </div>

            <!-- Facebook: BLOCKED (will open in new tab) -->
            <div class="social-card" data-platform="Facebook" data-url="https://www.facebook.com/" data-embed="false">
                <div class="logo-svg">
                    <svg viewBox="0 0 24 24" width="48" height="48" fill="#1877F2">
                        <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                    </svg>
                </div>
                <span class="platform-name">Facebook</span>
                <span class="link-badge">🔗 link</span>
            </div>

            <!-- Instagram: BLOCKED -->
            <div class="social-card" data-platform="Instagram" data-url="https://www.instagram.com/" data-embed="false">
                <div class="logo-svg">
                    <svg viewBox="0 0 24 24" width="48" height="48" fill="#E4405F">
                        <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
                    </svg>
                </div>
                <span class="platform-name">Instagram</span>
                <span class="link-badge">🔗 link</span>
            </div>

            <!-- Messenger: BLOCKED -->
            <div class="social-card" data-platform="Messenger" data-url="https://www.messenger.com/" data-embed="false">
                <div class="logo-svg">
                    <svg viewBox="0 0 24 24" width="48" height="48" fill="#00B2FF">
                        <path d="M12 0C5.373 0 0 5.373 0 12c0 6.016 4.432 10.984 10.206 11.852v-8.38H7.13v-3.47h3.075V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.38C19.568 22.984 24 18.016 24 12c0-6.627-5.373-12-12-12z"/>
                    </svg>
                </div>
                <span class="platform-name">Messenger</span>
                <span class="link-badge">🔗 link</span>
            </div>
        </div>

        <div style="text-align:center;color:#5e7291;font-size:0.8rem;margin-top:1rem;border-top:1px solid #242d3b;padding-top:1.2rem;">
            🟢 <strong>Embed</strong> = works inside iframe &nbsp;·&nbsp; 🟡 <strong>Link</strong> = opens in new tab (platform blocks iframe)
        </div>
    </div>

    <!-- Full‑screen iframe overlay -->
    <div class="iframe-overlay" id="iframeOverlay">
        <div class="iframe-header">
            <div class="platform-title">
                <span id="platformName">Platform</span>
                <span class="mode-tag" id="modeTag">🔓 iframe</span>
            </div>
            <button class="close-btn" id="closeIframeBtn">✕</button>
        </div>
        <div class="iframe-wrapper" id="iframeWrapper">
            <iframe id="socialIframe" src="about:blank" allow="encrypted-media; fullscreen; camera; microphone; display-capture; autoplay; clipboard-write" loading="eager"></iframe>
        </div>
    </div>

    <script>
        (function() {
            const overlay = document.getElementById('iframeOverlay');
            const iframe = document.getElementById('socialIframe');
            const platformNameSpan = document.getElementById('platformName');
            const modeTag = document.getElementById('modeTag');
            const closeBtn = document.getElementById('closeIframeBtn');
            const iframeWrapper = document.getElementById('iframeWrapper');

            // Store current fallback URL for link mode
            let currentFallbackUrl = '';

            function closeIframe() {
                overlay.classList.remove('active');
                iframe.src = 'about:blank';
                document.body.style.overflow = '';
                currentFallbackUrl = '';
            }

            // For embed platforms: show in iframe
            function openEmbed(url, platformName) {
                iframe.src = url;
                platformNameSpan.textContent = platformName || 'Platform';
                modeTag.textContent = '🟢 embed';
                modeTag.style.color = '#7ddfa0';
                overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            // For blocked platforms: show fallback with "Open in new tab" button
            function showFallback(platformName, url) {
                // Clear iframe
                iframe.src = 'about:blank';
                platformNameSpan.textContent = platformName || 'Platform';
                modeTag.textContent = '🟡 link (blocked)';
                modeTag.style.color = '#e8c86a';

                // Build fallback UI inside iframe wrapper
                iframeWrapper.innerHTML = `
                    <div class="fallback-message">
                        <h2>🔒 ${platformName} blocks iframe</h2>
                        <p>For security reasons, ${platformName} does not allow being displayed inside an iframe.<br><br>
                        <strong>Click the button below to open it in a new tab.</strong></p>
                        <a href="${url}" target="_blank" rel="noopener noreferrer" class="btn-open">
                            🌐 Open ${platformName} in new tab
                        </a>
                        <p style="margin-top:1.2rem;font-size:0.75rem;color:#667799;">
                            ⚡ You can log in and use it normally in the new tab.
                        </p>
                    </div>
                `;

                overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
                currentFallbackUrl = url;
            }

            // Handle card click
            document.querySelectorAll('.social-card').forEach(card => {
                card.addEventListener('click', function(e) {
                    const platform = this.dataset.platform || 'Social';
                    const isEmbed = this.dataset.embed === 'true';
                    let url = this.dataset.url || '';

                    if (!url) return;

                    // Ensure https
                    if (!url.startsWith('http://') && !url.startsWith('https://')) {
                        url = 'https://' + url;
                    }

                    if (isEmbed) {
                        // Use embed URL if provided, otherwise use the main URL
                        let embedUrl = this.dataset.embedUrl || url;
                        if (!embedUrl.startsWith('http://') && !embedUrl.startsWith('https://')) {
                            embedUrl = 'https://' + embedUrl;
                        }
                        // For YouTube, TikTok, X we need to keep the embed URL as is
                        // They will show the embed page (which works)
                        openEmbed(embedUrl, platform);
                    } else {
                        // Blocked: show fallback with open in new tab
                        showFallback(platform, url);
                    }
                });
            });

            // Close button
            closeBtn.addEventListener('click', closeIframe);

            // ESC key
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && overlay.classList.contains('active')) {
                    closeIframe();
                }
            });

            // Click on overlay background (but not on iframe or fallback content) closes it
            overlay.addEventListener('click', function(e) {
                if (e.target === overlay || e.target === iframeWrapper) {
                    closeIframe();
                }
            });

            console.log('Social Hub with smart iframe handling loaded.');
            console.log('🟢 Embed: YouTube, X, TikTok  |  🟡 Link: Facebook, Instagram, Messenger');
        })();
    </script>

</body>
  </html>
